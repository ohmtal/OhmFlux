plugins {
    id 'com.android.application'
}

android {
    namespace "org.libsdl.app"
    compileSdkVersion 35

    defaultConfig {
        applicationId "com.ohmtal.irontuner"
        minSdkVersion 21
        targetSdkVersion 35
        versionCode 1
        versionName "1.0"
    }

    sourceSets {
        main {
            // This is the only part we need: tell it where the .so files are
            jniLibs.srcDir 'libs'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation 'androidx.core:core:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
}


configurations.all {
    resolutionStrategy {
        eachDependency { details ->
            if (details.requested.group == 'org.jetbrains.kotlin') {
                if (details.requested.name.contains('kotlin-stdlib-jdk')) {
                    details.useTarget "org.jetbrains.kotlin:kotlin-stdlib:${details.requested.version}"
                }
            }
        }
    }
}
